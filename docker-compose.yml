version: '3.8'

services:
  mongo:
    image: mongo:7.0
    container_name: orders_mongo
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: |
        mongosh --eval "
          try { rs.status().ok }
          catch(e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] }).ok }
        " --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  app:
    build: .
    container_name: orders_app
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/ordersdb?replicaSet=rs0
      - PORT=3000
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data: